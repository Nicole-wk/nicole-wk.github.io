<!DOCTYPE html>
<html>
<head>
    <title>Meeting Scheduler | Admin Dashboard</title>
    <style>
        :root {
          --navy: #1C2B4A;
          --gold: #C9A84C;
          --terracotta: #C4673A;
          --cream: #FAF7F2;
          --charcoal: #2D2D2D;
          --muted: #7A7060;
          --soft-border: #E8E0D4;
          --success: #27ae60;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: var(--cream);
          color: var(--charcoal);
          line-height: 1.6;
          padding: 40px 20px;
        }

        .container {
          max-width: 1200px;
          margin: 0 auto;
        }

        h1 {
          font-family: 'Cormorant Garamond', Georgia, serif;
          font-size: 2.8rem;
          font-weight: 600;
          color: var(--navy);
          text-align: center;
          margin-bottom: 8px;
        }

        .subtitle {
          text-align: center;
          color: var(--muted);
          font-size: 0.9rem;
          margin-bottom: 40px;
          font-weight: 300;
        }

        /* Tabs */
        .tabs {
          display: flex;
          justify-content: center;
          gap: 16px;
          margin-bottom: 32px;
        }

        .tab-btn {
          background: white;
          border: 1px solid var(--soft-border);
          padding: 12px 28px;
          border-radius: 30px;
          font-family: 'DM Sans', sans-serif;
          font-size: 14px;
          font-weight: 500;
          cursor: pointer;
          transition: all 0.2s;
          color: var(--navy);
        }

        .tab-btn.active {
          background: var(--navy);
          color: white;
          border-color: var(--navy);
        }

        .tab-btn:hover:not(.active) {
          background: var(--gold);
          color: var(--navy);
          border-color: var(--gold);
        }

        /* Cards */
        .card {
          background: white;
          border-radius: 12px;
          border: 1px solid var(--soft-border);
          padding: 28px;
          margin-bottom: 24px;
          box-shadow: 0 2px 8px rgba(28,43,74,0.05);
        }

        .card h2 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 1.5rem;
          font-weight: 600;
          color: var(--navy);
          margin-bottom: 20px;
          padding-bottom: 10px;
          border-bottom: 2px solid var(--gold);
          display: inline-block;
        }

        /* Stats grid */
        .stats-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 20px;
          margin-bottom: 30px;
        }

        .stat-card {
          background: var(--navy);
          padding: 24px;
          border-radius: 10px;
          text-align: center;
        }

        .stat-card h3 {
          font-size: 0.75rem;
          font-weight: 500;
          color: rgba(255,255,255,0.7);
          text-transform: uppercase;
          letter-spacing: 1.5px;
          margin-bottom: 12px;
        }

        .stat-number {
          font-family: 'Cormorant Garamond', serif;
          font-size: 2rem;
          font-weight: 600;
          color: var(--gold);
        }

        /* Slots grid */
        .slots-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 12px;
          margin-top: 20px;
        }

        .slot {
          background: var(--cream);
          padding: 12px;
          text-align: center;
          border-radius: 8px;
          cursor: pointer;
          transition: all 0.2s;
          border: 1px solid var(--soft-border);
          font-size: 14px;
        }

        .slot:hover {
          background: var(--gold);
          color: var(--navy);
          transform: translateY(-2px);
          border-color: var(--gold);
        }

        /* Forms */
        .form-group {
          margin-bottom: 20px;
        }

        label {
          display: block;
          margin-bottom: 6px;
          font-weight: 500;
          color: var(--navy);
          font-size: 14px;
        }

        input, select {
          width: 100%;
          padding: 12px;
          border: 1px solid var(--soft-border);
          border-radius: 6px;
          font-family: 'DM Sans', sans-serif;
          font-size: 14px;
        }

        input:focus {
          outline: none;
          border-color: var(--gold);
          box-shadow: 0 0 0 2px rgba(201,168,76,0.2);
        }

        button {
          background: var(--navy);
          color: white;
          border: none;
          padding: 10px 24px;
          border-radius: 6px;
          font-family: 'DM Sans', sans-serif;
          font-size: 14px;
          font-weight: 500;
          cursor: pointer;
          transition: all 0.2s;
        }

        button:hover {
          background: var(--terracotta);
          transform: translateY(-1px);
        }

        /* Table */
        table {
          width: 100%;
          border-collapse: collapse;
        }

        th, td {
          padding: 12px;
          text-align: left;
          border-bottom: 1px solid var(--soft-border);
        }

        th {
          background: var(--cream);
          font-weight: 600;
          color: var(--navy);
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }

        .cancel-btn {
          background: var(--terracotta);
          padding: 5px 12px;
          font-size: 12px;
        }

        /* Messages */
        .message {
          padding: 12px;
          border-radius: 8px;
          margin: 16px 0;
        }

        .success {
          background: #d4edda;
          color: #155724;
          border: 1px solid #c3e6cb;
        }

        .error {
          background: #f8d7da;
          color: #721c24;
          border: 1px solid #f5c6cb;
        }

        .hidden {
          display: none;
        }

        @media (max-width: 700px) {
          h1 { font-size: 2rem; }
          .tabs { flex-direction: column; align-items: center; }
          .tab-btn { width: 200px; }
          .slots-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Meeting Scheduler</h1>
        <p class="subtitle">For Operations & Admin Teams</p>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('book')">📝 Book a Meeting</button>
            <button class="tab-btn" onclick="showTab('dashboard')">📊 Admin Dashboard</button>
        </div>
        
        <!-- Book Meeting Tab -->
        <div id="bookTab">
            <div class="card">
                <h2>Select a Time Slot</h2>
                <div id="slotsContainer" class="slots-grid">Loading available slots...</div>
            </div>
            
            <div id="bookingForm" class="card hidden">
                <h2>Your Information</h2>
                <form id="bookForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="guestName" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="guestEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Selected Time</label>
                        <input type="text" id="selectedSlot" readonly>
                    </div>
                    <button type="submit">Confirm Booking</button>
                    <button type="button" onclick="closeBookingForm()">Cancel</button>
                </form>
            </div>
            
            <div id="messageArea"></div>
        </div>
        
        <!-- Admin Dashboard Tab -->
        <div id="dashboardTab" class="hidden">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Meetings</h3>
                    <div class="stat-number" id="totalMeetings">0</div>
                </div>
                <div class="stat-card">
                    <h3>This Week</h3>
                    <div class="stat-number" id="weeklyMeetings">0</div>
                </div>
                <div class="stat-card">
                    <h3>Most Popular Day</h3>
                    <div class="stat-number" id="popularDay">-</div>
                </div>
            </div>
            
            <div class="card">
                <h2>📋 Upcoming & Past Meetings</h2>
                <div id="meetingsList">Loading meetings...</div>
            </div>
        </div>
    </div>
    
    <script>
        // IMPORTANT: Replace this with your actual Render URL
        const API_URL = 'https://meeting-scheduler-api-fwn7.onrender.com';
        
        let selectedSlot = null;
        
        // Show/hide tabs
        function showTab(tab) {
            if (tab === 'book') {
                document.getElementById('bookTab').classList.remove('hidden');
                document.getElementById('dashboardTab').classList.add('hidden');
                loadAvailableSlots();
            } else {
                document.getElementById('bookTab').classList.add('hidden');
                document.getElementById('dashboardTab').classList.remove('hidden');
                loadDashboard();
            }
            
            // Update active button styling
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        // Load available time slots
        async function loadAvailableSlots() {
            try {
                const response = await fetch(`${API_URL}/api/slots`);
                const slots = await response.json();
                
                const container = document.getElementById('slotsContainer');
                
                if (slots.length === 0) {
                    container.innerHTML = '<p>No available slots in the next 7 days</p>';
                    return;
                }
                
                container.innerHTML = slots.map(slot => `
                    <div class="slot" onclick="selectSlot('${slot.datetime}', '${slot.date} ${slot.time}')">
                        ${slot.date}<br>
                        <strong>${slot.time}</strong>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('slotsContainer').innerHTML = 
                    '<p class="error">Error loading slots. Make sure your backend is running.</p>';
            }
        }
        
        // Select a time slot
        function selectSlot(datetime, displayTime) {
            selectedSlot = { datetime, displayTime };
            document.getElementById('selectedSlot').value = displayTime;
            document.getElementById('bookingForm').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('bookingForm').offsetTop, behavior: 'smooth' });
        }
        
        // Close booking form
        function closeBookingForm() {
            document.getElementById('bookingForm').classList.add('hidden');
            selectedSlot = null;
        }
        
        // Book a meeting
        document.getElementById('bookForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('guestName').value;
            const email = document.getElementById('guestEmail').value;
            
            if (!selectedSlot) {
                showMessage('Please select a time slot first', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/book`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        datetime: selectedSlot.datetime
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('✅ Meeting booked successfully! A confirmation has been sent.', 'success');
                    closeBookingForm();
                    document.getElementById('bookForm').reset();
                    loadAvailableSlots(); // Refresh slots
                } else {
                    showMessage('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error booking meeting', 'error');
            }
        });
        
        // Load admin dashboard
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}/api/meetings`);
                const meetings = await response.json();
                
                // Update stats
                document.getElementById('totalMeetings').textContent = meetings.length;
                
                // Calculate weekly meetings
                const oneWeekAgo = new Date();
                oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
                const weekly = meetings.filter(m => new Date(m.datetime) > oneWeekAgo);
                document.getElementById('weeklyMeetings').textContent = weekly.length;
                
                // Find most popular day
                const dayCount = {};
                meetings.forEach(m => {
                    const day = new Date(m.datetime).toLocaleDateString('en-US', { weekday: 'long' });
                    dayCount[day] = (dayCount[day] || 0) + 1;
                });
                let popularDay = '-';
                let maxCount = 0;
                for (const [day, count] of Object.entries(dayCount)) {
                    if (count > maxCount) {
                        maxCount = count;
                        popularDay = day;
                    }
                }
                document.getElementById('popularDay').textContent = popularDay;
                
                // Display meetings table
                if (meetings.length === 0) {
                    document.getElementById('meetingsList').innerHTML = '<p>No meetings booked yet</p>';
                    return;
                }
                
                let html = '<table><thead><tr><th>Date & Time</th><th>Name</th><th>Email</th><th></th></tr></thead><tbody>';
                meetings.forEach(meeting => {
                    html += `
                        <tr>
                            <td>${meeting.datetime.replace(' ', '<br>')}</td>
                            <td>${meeting.name}</td>
                            <td>${meeting.email}</td>
                            <td><button class="cancel-btn" onclick="cancelMeeting(${meeting.id})">Cancel</button></td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
                document.getElementById('meetingsList').innerHTML = html;
                
            } catch (error) {
                document.getElementById('meetingsList').innerHTML = '<p class="error">Error loading meetings</p>';
            }
        }
        
        // Cancel a meeting
        async function cancelMeeting(id) {
            if (!confirm('Are you sure you want to cancel this meeting?')) return;
            
            try {
                await fetch(`${API_URL}/api/cancel/${id}`, { method: 'DELETE' });
                loadDashboard();
                showMessage('Meeting cancelled', 'success');
            } catch (error) {
                showMessage('Error cancelling meeting', 'error');
            }
        }
        
        // Show message
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('messageArea');
            messageDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }
        
        // Initial load
        loadAvailableSlots();
    </script>
</body>
</html>
